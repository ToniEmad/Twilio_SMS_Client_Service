<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSMS - Logout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/user.css">
</head>
<body>
    <div class="dashboard">
        <div id="sidebar"></div>

        <main class="main-content">
            <div class="logout-container">
                <div class="logout-card">
                    <div class="logout-icon">
                        <i class="fas fa-sign-out-alt"></i>
                    </div>
                    <h2>Logout Confirmation</h2>
                    <p>Are you sure you want to logout from your account?</p>
                    <div class="logout-actions">
                        <button class="btn btn-secondary" onclick="window.history.back()">
                            <i class="fas fa-arrow-left"></i>
                            Cancel
                        </button>
                        <button class="btn btn-primary" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
    // تحميل الـ Sidebar عند فتح الصفحة
    document.addEventListener("DOMContentLoaded", function () {
        fetch("sidebar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("sidebar").innerHTML = data;
                highlightActiveLink();
            })
            .catch(error => console.error("An error occurred while loading the sidebar:", error));
    });

    // تمييز الرابط النشط في القائمة الجانبية
    function highlightActiveLink() {
        let currentPage = window.location.pathname.split("/").pop();
        let links = document.querySelectorAll("#sidebar .nav-item");

        links.forEach(link => {
            if (link.getAttribute("href") === currentPage) {
                link.classList.add("active");
            }
        });
    }

    // حذف بيانات الجلسة عند تسجيل الخروج
document.getElementById("logoutBtn").addEventListener("click", function () {
    fetch("LogoutServlet") // استدعاء السيرفلت لمسح الجلسة
        .then(response => {
            if (response.ok) {
                sessionStorage.clear(); // مسح بيانات الجلسة في المتصفح
                localStorage.clear(); 
                
                // حذف الكوكيز (لو عندك أي بيانات في الكوكيز)
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });

                window.location.href = "login.html"; // تحويل المستخدم لصفحة تسجيل الدخول
            } else {
                console.error("Logout failed.");
            }
        })
        .catch(error => console.error("An error occurred while logging out:", error));
});

</script>

</body>
</html>
