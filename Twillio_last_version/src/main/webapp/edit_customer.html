<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
    <div class="dashboard">
        <div id="sidebar_admin"></div>

        <main class="main-content">
            <div class="header">
                <h1>Edit Customer</h1>
            </div>

            <div class="form-container" style="box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); padding: 20px; border-radius: 10px; background-color: #fff;">
                <form id="editCustomerForm">
                    <div class="input-box">
                        <i class="fas fa-user" style="color: #7c4dff;"></i>
                        <input type="text" id="customerName" placeholder="Name" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-phone" style="color: #7c4dff;"></i>
                        <input type="tel" id="customerPhone" placeholder="Phone Number" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-envelope" style="color: #7c4dff;"></i>
                        <input type="email" id="customerEmail" placeholder="Email" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-lock"  style="color: #7c4dff;"></i>
                        <input type="password" id="customerPassword" placeholder="Password" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-calendar" style="color: #7c4dff;"></i>
                        <input type="date" id="customerBirthday" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-briefcase" style="color: #7c4dff;"></i>
                        <input type="text" id="job" placeholder="Job" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-map-marker-alt" style="color: #7c4dff;"></i>
                        <input type="text" id="address" placeholder="Address" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-key" style="color: #7c4dff;"></i>
                        <input type="text" id="accountSID" placeholder="Account SID" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-key" style="color: #7c4dff;"></i>
                        <input type="text" id="accountToken" placeholder="Account Token" required>
                    </div>
                    <div class="button-container">
                        <button type="button" class="btn btn-danger" id="blockAccountBtn">
                            <i class="fas fa-ban"></i>
                            Block Account
                        </button>
                        <button type="button" class="btn btn-primary" id="updateAccountBtn">
                            <i class="fas fa-save"></i>
                            Update
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Function to get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Populate the form with customer data from URL parameters
        document.getElementById('customerName').value = getUrlParameter('name');
        document.getElementById('customerPhone').value = getUrlParameter('phone');
        document.getElementById('customerEmail').value = getUrlParameter('email');
        document.getElementById('customerPassword').value = getUrlParameter('password');
        document.getElementById('customerBirthday').value = getUrlParameter('birthday');

        // Handle form submission
        document.getElementById('editCustomerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // Logic to update customer data goes here
            alert("Customer data updated successfully!");
        });

        // Handle account blocking
        document.getElementById('blockAccountBtn').addEventListener('click', function() {
            // Logic to block the account goes here
            alert("Account has been blocked!");
        });
    
        
        fetch("sidebar_admin.html")
            .then(response => response.text()) 
            .then(data => {
                document.getElementById("sidebar_admin").innerHTML = data; 
            })
            .catch(error => console.error("An error occurred while loading the sidebar:", error));
      document.addEventListener("DOMContentLoaded", function () {
    fetch("sidebar_admin.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("sidebar_admin").innerHTML = data;

            // Wait for the sidebar to be added to the DOM
            highlightActiveLink();
        })
        .catch(error => console.error("An error occurred while loading the sidebar:", error));
});

// Function to highlight the active menu item
function highlightActiveLink() {
    let currentPage = window.location.pathname.split("/").pop(); // Get current page filename
    let links = document.querySelectorAll("#sidebar_admin .nav-item");

    links.forEach(link => {
        if (link.getAttribute("href") === currentPage) {
            link.classList.add("active");
        }
    });}
    </script>
</body>
</html>
