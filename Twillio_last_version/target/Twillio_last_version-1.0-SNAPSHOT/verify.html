<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account</title>
    <link rel="stylesheet" href="./css/verify.css">
    <script>
        function resendCode() {
            const btn = document.getElementById("resendBtn");
            btn.disabled = true;
            let timeLeft = 30;
            
            const interval = setInterval(() => {
                btn.textContent = "Resend Code (" + timeLeft + "s)";
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.textContent = "Resend Code";
                }
            }, 1000);
            
            alert("A new verification code has been sent.");
            window.location.href = "<%= request.getContextPath() %>/VerifyServlet?resend=true";
        }

        function toggleForms() {
            document.getElementById("phoneForm").style.display = "none";
            document.getElementById("verifyForm").style.display = "block";
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Verify Your Account</h2>

        <!-- فورم إدخال رقم الهاتف -->
        <form id="phoneForm" action="<%= request.getContextPath() %>/VerifyServlet" method="post">
            <p>Enter your phone number to receive a verification code:</p>
            <input type="text" placeholder="Enter your phone number" required name="msisdn">        
            <input type="submit" value="Send Code">
        </form>

        <!-- فورم إدخال كود التحقق -->
        <form id="verifyForm" action="<%= request.getContextPath() %>/VerifyServlet" method="get" style="display: none;">
            <p>We sent a verification code to: <strong id="phoneDisplay"></strong></p>
            <input type="hidden" name="msisdn" id="msisdnField">        
            <input type="text" placeholder="Enter verification code" required name="code">
            <input type="submit" value="Verify">
        </form>

        <button id="resendBtn" onclick="resendCode()" style="display: none;">Resend Code</button>

        <p id="errorMessage" style="color: red; display: none;"></p>
    </div>

    <script>
        // جلب رقم الهاتف من الـ session بعد إدخاله
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get("phone");
        if (phone) {
            document.getElementById("phoneDisplay").innerText = phone;
            document.getElementById("msisdnField").value = phone;
            toggleForms(); // إخفاء فورم إدخال الهاتف بعد إرساله
            document.getElementById("resendBtn").style.display = "block"; // عرض زر إعادة الإرسال
        }

        // عرض رسالة الخطأ لو فيه error
        const error = urlParams.get("error");
        if (error) {
            document.getElementById("errorMessage").innerText = error;
            document.getElementById("errorMessage").style.display = "block";
        }
    </script>
</body>
</html>
