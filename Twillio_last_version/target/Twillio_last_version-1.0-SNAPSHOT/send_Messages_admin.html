<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSMS </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/user.css">
</head>
<body class="messages-page">
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo">
                    <span class="logo-icon">
                        <!-- <i class="fas fa-layer-group"></i> -->
                        <img src="../img/25.png" alt="Logo">
                    </span>
                    
                </div>
            </div>


            <nav class="nav-section">
                <div class="nav-title">Main Menu</div>
                <a href="admin_profile.html" class="nav-item ">
                    <i class="fas fa-home"></i>
                    Dashboard
                </a>
                <a href="customers.html" class="nav-item ">
                    <i class="fas fa-users"></i>
                    Customers
                </a>
                <a href="manage_customer.html" class="nav-item">
                    <i class="fas fa-edit"></i>
                    Manage Customers
                </a>
                <a href="send_Messages_admin.html" class="nav-item active">
                    <i class="fas fa-envelope"></i>
                    Messages
                </a>
             
                <a href="logout_admin.html" class="nav-item ">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Send New Message</h1>
                <!-- <div class="balance">
                    Balance: $349.99
                </div> -->
            </div>

            <div class="message-form">
                <form id="smsForm">
                    <div class="form-group">
                        <label>From (Phone Number)</label>
                        <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-group">
                        <label>To (Phone Number)</label>
                        <input type="tel" class="form-control" placeholder="Enter recipient phone number" required>
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control message-area" placeholder="Type your message here..." required></textarea>
                        <div class="character-count">
                            <span id="charCount">0</span>/160 characters
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i>
                            Send Message
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Character counter
        const textarea = document.querySelector('.message-area');
        const charCount = document.getElementById('charCount');

        textarea.addEventListener('input', function() {
            const count = this.value.length;
            charCount.textContent = count;
            if (count > 160) {
                charCount.style.color = 'var(--danger)';
            } else {
                charCount.style.color = 'var(--text-muted)';
            }
        });

        // Form submission
        document.getElementById('smsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your SMS sending logic here
            alert('Message sent successfully!');
        });
    </script>
</body>
</html>
