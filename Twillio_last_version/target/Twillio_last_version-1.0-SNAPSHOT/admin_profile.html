<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TSMS </title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/admin.css">

    </head>
    <body>
        <div class="dashboard">
            <div id="sidebar_admin"></div>

            <main class="main-content">
                <div class="header">
                    <h1>Dashboard Overview</h1>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-value">5,847</div>
                        <div class="stat-label">Total Customers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                        <div class="stat-value">12,458</div>
                        <div class="stat-label">Messages Sent</div>
                    </div>
                </div>

                <div class="table-container">
                    <div id="chart-container">
                        <canvas id="userMessagesChart"></canvas>
                    </div>
                </div>
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
       <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('userMessagesChart').getContext('2d');
        const userMessagesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total Customers', 'Messages Sent'],
                datasets: [{
                    label: 'analyses',
                    data: [5000, 12500],
                    
                    backgroundColor: [
                        'rgba(102, 51, 153, 0.7)',
                        'rgba(153, 102, 255, 0.7)'
                    ],
                    borderColor: [
                        'rgba(102, 51, 153, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 2,
                    borderRadius: 8,
                    barPercentage: 0.6
                }]
            },
            options: {
                scales: {
                    y: {
                        display: false,
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });
    
        
         document.addEventListener("DOMContentLoaded", function () {
                fetch("sidebar_admin.html")
                        .then(response => response.text())
                        .then(data => {
                            document.getElementById("sidebar_admin").innerHTML = data;

                            // Wait for the sidebar to be added to the DOM
                            highlightActiveLink();
                        })
                        .catch(error => console.error("An error occurred while loading the sidebar:", error));
            });

    // Function to highlight the active menu item
            function highlightActiveLink() {
                let currentPage = window.location.pathname.split("/").pop(); // Get current page filename
                let links = document.querySelectorAll("#sidebar_admin .nav-item");

                links.forEach(link => {
                    if (link.getAttribute("href") === currentPage) {
                        link.classList.add("active");
                    }
                });
            }
       //session     
    function fetchSessionData() {
        fetch('GetSessionDataServlet') // استدعاء السيرفلت لاسترجاع البيانات
            .then(response => response.json())
            .then(data => {
                if (data.username) {
                    sessionStorage.setItem("username", data.username);
                    sessionStorage.setItem("role", data.role);
                    document.getElementById("username").textContent = data.username;
                } else {
                    window.location.href = "login.html"; // إعادة التوجيه لو لم يتم تسجيل الدخول
                }
            })
            .catch(error => console.error("Error fetching session data:", error));
    }

    document.addEventListener("DOMContentLoaded", fetchSessionData);
</script>
    </body>
</html>
