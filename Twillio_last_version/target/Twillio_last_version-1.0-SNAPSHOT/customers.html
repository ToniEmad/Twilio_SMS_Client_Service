<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body onload="loadProfiles()">
    <div class="dashboard">
        <div id="sidebar_admin"></div>

        <main class="main-content">
            <div class="header">
                <h1>Customers Overview</h1>
                
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search Customers..." onkeyup="filterCustomers()">
                </div>

            </div>

            <div class="table-container">
                <div class="table-header">
                    <h2 class="table-title">All Customers</h2>
                    <div>
                        <button class="btn btn-primary" id="addCustomerBtn">
                            <i class="fas fa-plus"></i>
                            Add Customer
                        </button>
                        
                        <button class="btn btn-primary" id="manageCustomerBtn">
                            <i class="fas fa-cog"></i>
                            Manage Customers
                        </button>
                    </div>
                </div>
<!--                <div  class="data-table" id="customerstable" id="profileContainer"></div>
            </div>-->
            <table class="data-table" id="profileContainer" ></table>
        </main>
    </div>

            
<div id="addCustomerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Add Customer</h2>
        <form id="addCustomerForm">
            <div class="input-boxes">
                <div class="input-box"><i class="fas fa-user"></i>
                    <input type="text" placeholder="Enter your name" required name="name">
                </div>
                <div class="input-box"><i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Enter your email" required name="email">
                </div>
                <div class="input-box"><i class="fas fa-lock"></i>
                    <input type="password" placeholder="Enter your password" required name="password">
                </div>
                <div class="input-box"><i class="fas fa-calendar"></i>
                    <input type="date" required name="birthday">
                </div>
                <div class="input-box"><i class="fas fa-phone"></i>
                    <input type="tel" placeholder="Enter your Phone Number" required name="phone">
                </div>
                <div class="input-box"><i class="fas fa-briefcase"></i>
                    <input type="text" placeholder="Enter your job" required name="job">
                </div>
                <div class="input-box"><i class="fas fa-location-dot"></i>
                    <input type="text" placeholder="Enter your address" required name="address">
                </div>
                <div class="input-box"><i class="fas fa-key"></i>
                    <input type="text" placeholder="Enter your Twilio SID" required name="twilio_sid">
                </div>
                <div class="input-box"><i class="fas fa-key"></i>
                    <input type="password" placeholder="Enter your Twilio Auth Token" required name="twilio_auth_token">
                </div>
                <div class="button input-box">
                    <input type="submit" value="Submit">
                </div>
            </div>
        </form>
    </div>
</div>
            
    <script>
        function loadProfiles() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "Customerlistservlet", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    document.getElementById("profileContainer").innerHTML = xhr.responseText;
                }
            };
            xhr.send();
        }

        document.getElementById('manageCustomerBtn').addEventListener('click', function() {
            window.location.href = 'manage_customer.html';
        });
    
        fetch("sidebar_admin.html")
            .then(response => response.text()) 
            .then(data => {
                document.getElementById("sidebar_admin").innerHTML = data; 
            })
            .catch(error => console.error("An error occurred while loading the sidebar:", error));
    
    // this for search part in html to be connected with html 
        function filterCustomers() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let table = document.getElementById("profileContainer");
        let rows = table.getElementsByTagName("tr");

        for (let i = 1; i < rows.length; i++) { // نبدأ من 1 لتجنب صف العناوين
            let nameCell = rows[i].getElementsByTagName("td")[0]; // عمود الاسم
            let phoneCell = rows[i].getElementsByTagName("td")[1]; // عمود الهاتف

            if (nameCell && phoneCell) {
                let nameText = nameCell.textContent.toLowerCase();
                let phoneText = phoneCell.textContent.toLowerCase();

                if (nameText.includes(input) || phoneText.includes(input)) {
                    rows[i].style.display = ""; // يظهر الصف
                } else {
                    rows[i].style.display = "none"; // يخفي الصف
                }
            }
        }
    }
    
    //this part is for delete action on customers overview part 
    
       function deleteCustomer(msisdn) {
        if (confirm("Are you sure you want to delete this customer?")) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "DeleteCustomerServlet", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    if (xhr.responseText === "success") {
                        alert("Customer deleted successfully!");
                        loadProfiles(); // إعادة تحميل القائمة بعد الحذف
                    } else {
                        alert("Error deleting customer.");
                    }
                }
            };
            xhr.send("msisdn=" + msisdn);
        }
    }
    
    
    // add customer 
    
    document.getElementById('addCustomerBtn').addEventListener('click', function () {
        document.getElementById('addCustomerModal').style.display = 'flex';});

    function closeModal() {
        document.getElementById('addCustomerModal').style.display = 'none';
    }

    document.getElementById('addCustomerForm').addEventListener('submit', function (event) {
        event.preventDefault();
        
        let formData = new FormData(this);
        let xhr = new XMLHttpRequest();
        xhr.open("POST", "AddCustomerServlet", true);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
                alert("Customer added successfully!");
                closeModal();
                loadProfiles(); // تحديث الجدول تلقائيًا بعد الإضافة
            }
        };

        xhr.send(new URLSearchParams(formData));
    });
</script>
</body>
</html>
